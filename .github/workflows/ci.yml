name: Lucky Boba CI

on:
  push:
    branches: [ main, staging, development, 'feature/**' ]
  pull_request:
    branches: [ main, staging, development ]

jobs:
  laravel-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, curl, libxml, mysql

      - name: Install Dependencies
        run: cd backend && composer install --prefer-dist --no-progress

      - name: Prepare Laravel Environment
        run: |
          cd backend
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite

      - name: Run Backend Tests
        run: |
          cd backend
          php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  react-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies
        run: cd frontend && npm install
      - name: Lint & Type Check
        run: cd frontend && npm run lint
      - name: Build Check
        run: |
          cd frontend
          echo "VITE_API_BASE_URL=https://luckybobastores.com/api" > .env.production
          npm run build

  # ============================================================
  # PRODUCTION DEPLOY — triggers on push to main
  # ============================================================
  deploy-production:
    runs-on: ubuntu-latest
    needs: [laravel-backend, react-frontend]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend (Production)
        run: |
          cd frontend
          echo "VITE_API_BASE_URL=https://luckybobastores.com/api" > .env.production
          npm install
          npm run build

      - name: Upload Build to Hostinger (Production)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 60s            
          command_timeout: 10m
          source: "frontend/dist/"
          target: "domains/luckybobastores.com/public_html/backend/public/"
          strip_components: 2

      - name: Finalize Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd domains/luckybobastores.com/public_html

            # Only update backend files, NOT frontend assets
            git fetch origin main
            git checkout origin/main -- backend

            cd backend
            composer install --no-dev --optimize-autoloader || composer2 install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            cd ..

            # Restore root index.html with corrected asset paths
            rm -f index.html
            cp backend/public/index.html index.html
            sed -i 's|src="/assets/|src="/backend/public/assets/|g' index.html
            sed -i 's|href="/assets/|href="/backend/public/assets/|g' index.html
            sed -i 's|href="/lucky.jpg"|href="/backend/public/lucky.jpg"|g' index.html
            sed -i '/<meta http-equiv="Content-Security-Policy"/,/blob:;">/d' index.html

            # Restore Production .htaccess
            cat > .htaccess << 'HTACCESS'
            DirectoryIndex index.html index.php
            Options -Indexes
            <IfModule mod_headers.c>
                Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://luckybobastores.com https://staging.luckybobastores.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:;"
            </IfModule>
            <IfModule mod_rewrite.c>
                RewriteEngine On
                RewriteBase /
                RewriteCond %{HTTPS} off
                RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
                RewriteCond %{REQUEST_FILENAME} -f [OR]
                RewriteCond %{REQUEST_FILENAME} -d
                RewriteRule ^ - [L]
                RewriteRule ^api/(.*)$ backend/public/index.php [L,QSA]
                RewriteRule ^assets/(.*)$ backend/public/assets/$1 [L]
                RewriteRule ^lucky\.jpg$ backend/public/lucky.jpg [L]
                RewriteRule ^favicon\.ico$ backend/public/favicon.ico [L]
                RewriteRule ^$ index.html [L]
                RewriteRule ^(.*)$ index.html [L]
            </IfModule>
            HTACCESS

  # ============================================================
  # STAGING DEPLOY — triggers on push to staging branch
  # ============================================================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [laravel-backend, react-frontend]
    if: github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend (Staging)
        run: |
          cd frontend
          echo "VITE_API_BASE_URL=https://staging.luckybobastores.com/api" > .env.production
          npm install
          npm run build

      - name: Upload Build to Hostinger (Staging)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 60s             
          command_timeout: 10m
          source: "frontend/dist/"
          target: "domains/luckybobastores.com/staging/backend/public/"
          strip_components: 2

      - name: Finalize Staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd domains/luckybobastores.com/staging

            # Only update backend files, NOT the whole repo (which would wipe uploaded assets)
            git fetch origin staging
            git checkout origin/staging -- backend

            # Setup staging .env if it doesn't exist
            if [ ! -f backend/.env ]; then
              cp backend/.env.example backend/.env
              cd backend && php artisan key:generate && cd ..
            fi

            cd backend
            composer install --no-dev --optimize-autoloader || composer2 install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            cd ..

            # Restore root index.html with corrected asset paths (same as prod)
            rm -f index.html
            cp backend/public/index.html index.html
            sed -i 's|src="/assets/|src="/backend/public/assets/|g' index.html
            sed -i 's|href="/assets/|href="/backend/public/assets/|g' index.html
            sed -i 's|href="/lucky.jpg"|href="/backend/public/lucky.jpg"|g' index.html
            sed -i '/<meta http-equiv="Content-Security-Policy"/,/blob:;">/d' index.html

            # Restore Staging .htaccess
            cat > .htaccess << 'HTACCESS'
            DirectoryIndex index.html index.php
            Options -Indexes
            <IfModule mod_headers.c>
                Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://luckybobastores.com https://staging.luckybobastores.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:;"
            </IfModule>
            <IfModule mod_rewrite.c>
                RewriteEngine On
                RewriteBase /
                RewriteCond %{HTTPS} off
                RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
                RewriteCond %{REQUEST_FILENAME} -f [OR]
                RewriteCond %{REQUEST_FILENAME} -d
                RewriteRule ^ - [L]
                RewriteRule ^api/(.*)$ backend/public/index.php [L,QSA]
                RewriteRule ^assets/(.*)$ backend/public/assets/$1 [L]
                RewriteRule ^lucky\.jpg$ backend/public/lucky.jpg [L]
                RewriteRule ^favicon\.ico$ backend/public/favicon.ico [L]
                RewriteRule ^$ index.html [L]
                RewriteRule ^(.*)$ index.html [L]
            </IfModule>
            HTACCESS