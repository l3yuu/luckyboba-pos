name: Lucky Boba CI

on:
  push:
    branches: [ main, staging, development, 'feature/**' ]
  pull_request:
    branches: [ main, staging, development ]

jobs:
  laravel-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, curl, libxml, mysql

      - name: Install Dependencies
        run: cd backend && composer install --prefer-dist --no-progress

      - name: Prepare Laravel Environment
        run: |
          cd backend
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite

      - name: Run Backend Tests
        run: |
          cd backend
          php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  react-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies
        run: cd frontend && npm install
      - name: Lint & Type Check
        run: cd frontend && npm run lint
      - name: Build Check
        run: |
          cd frontend
          echo "VITE_API_BASE_URL=https://luckybobastores.com/api" > .env.production
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [laravel-backend, react-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # 1. Build React on GitHub (since server lacks npm)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          cd frontend
          echo "VITE_API_BASE_URL=https://luckybobastores.com/api" > .env.production
          npm install
          npm run build

      # 2. Upload the 'dist' folder to the server
      - name: Upload Build to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "frontend/dist/"
          target: "domains/luckybobastores.com/public_html/backend/public/"
          strip_components: 2

      # 3. Finalize Backend + Restore index.html and .htaccess via SSH
      - name: Update Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd domains/luckybobastores.com/public_html

            # Pull latest code
            git pull origin main

            # Update Laravel backend
            cd backend
            composer install --no-dev --optimize-autoloader || composer2 install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            cd ..

            # Restore root index.html from the freshly built frontend
            # (Vite builds to backend/public/index.html via scp above)
            cp backend/public/index.html index.html

            # Fix asset paths to point to backend/public/assets/
            # because the root serves from public_html/, not backend/public/
            sed -i 's|src="/assets/|src="/backend/public/assets/|g' index.html
            sed -i 's|href="/assets/|href="/backend/public/assets/|g' index.html
            sed -i 's|href="/lucky.jpg"|href="/backend/public/lucky.jpg"|g' index.html

            # Always restore .htaccess so deploys never break routing
            cat > .htaccess << 'HTACCESS'
            DirectoryIndex index.html index.php
            Options -Indexes
            <IfModule mod_rewrite.c>
                RewriteEngine On
                RewriteBase /

                # Force HTTPS
                RewriteCond %{HTTPS} off
                RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

                # Skip real existing files/dirs
                RewriteCond %{REQUEST_FILENAME} -f [OR]
                RewriteCond %{REQUEST_FILENAME} -d
                RewriteRule ^ - [L]

                # API → Laravel
                RewriteRule ^api/(.*)$ backend/public/index.php [L,QSA]

                # Static assets → backend/public/
                RewriteRule ^assets/(.*)$ backend/public/assets/$1 [L]
                RewriteRule ^lucky\.jpg$ backend/public/lucky.jpg [L]
                RewriteRule ^favicon\.ico$ backend/public/favicon.ico [L]

                # Everything else → React SPA
                RewriteRule ^$ index.html [L]
                RewriteRule ^(.*)$ index.html [L]
            </IfModule>
            HTACCESS