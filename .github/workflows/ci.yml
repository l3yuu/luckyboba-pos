name: Lucky Boba CI

on:
  push:
    branches: [ main, staging, development, 'feature/**' ]
  pull_request:
    branches: [ main, staging, development ]

jobs:
  laravel-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, curl, libxml, mysql

      - name: Install Dependencies
        run: cd backend && composer install --prefer-dist --no-progress

      - name: Prepare Laravel Environment
        run: |
          cd backend
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite

      - name: Run Backend Tests
        run: |
          cd backend
          php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  react-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies
        run: cd frontend && npm install
      - name: Lint & Type Check
        run: cd frontend && npm run lint
      - name: Build Check
        run: |
          cd frontend
          echo "VITE_API_BASE_URL=https://luckybobastores.com/api" > .env.production
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [laravel-backend, react-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      # 1. Build React on GitHub (since server lacks npm)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Frontend
        run: |
          cd frontend
          # Force Vite to use this exact URL by writing it to a file
          echo "VITE_API_BASE_URL=https://luckybobastores.com/api" > .env.production
          npm install
          npm run build

      # 2. Upload the 'dist' folder to the server
      - name: Upload Build to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "frontend/dist/"
          # CORRECTED PATH: Pointing to the specific addon domain folder
          target: "domains/luckybobastores.com/public_html/backend/public/"
          strip_components: 2

      # 3. Finalize Backend via SSH
      - name: Update Backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # CORRECTED PATH: Navigating to the addon domain folder
            cd domains/luckybobastores.com/public_html
            
            # Force git to ignore local changes to the build folder
            git pull origin main
            
            cd backend
            # Fallback for composer versions
            composer install --no-dev --optimize-autoloader || composer2 install --no-dev --optimize-autoloader
            
            # Run migrations to update the 'sales' and 'products' tables
            php artisan migrate --force
            
            # Clear caches so the new .env and routes are live
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache