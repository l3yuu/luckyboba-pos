name: Lucky Boba CI

on:
  push:
    branches: [ main, staging, development, 'feature/**' ]
  pull_request:
    branches: [ main, staging, development ]

jobs:
  laravel-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, curl, libxml, mysql

      - name: Install Dependencies
        run: cd backend && composer install --prefer-dist --no-progress

      - name: Prepare Laravel Environment
        run: |
          cd backend
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite

      - name: Run Backend Tests
        run: |
          cd backend
          php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

  react-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies
        run: cd frontend && npm install
      - name: Lint & Type Check
        run: cd frontend && npm run lint
      - name: Build Check
        run: cd frontend && npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [laravel-backend, react-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Navigate to the root of your Lucky Boba project
            cd domains/yourdomain.com/public_html 
            
            # Pull changes
            git pull origin main
            
            # 1. Update Backend (Laravel)
            cd backend
            composer2 install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            
            # 2. Update Frontend (React)
            cd ../frontend
            npm install
            npm run build
            
            # 3. Final Sync
            # Ensure the React build (dist) is accessible by Laravel
            rm -rf ../backend/public/dist
            cp -r dist ../backend/public/